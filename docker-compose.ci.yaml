services:
  # Bundled MySQL for CI only (testing prisma migrations + app boot). Not deployed.
  db:
    image: mysql:8.3
    cap_add:
      - SYS_NICE
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-vision}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  app:
    depends_on:
      db:
        condition: service_healthy
